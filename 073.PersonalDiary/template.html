<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diary</title>

    <!--  Preferably, css styling can be added here...  -->
</head>
<body>
    <h1 class="heading">My Diary</h1>
    <div class="container">
        {% for entry in data %}
            <div class="entry">
                <h3 class="date">{{ entry[0] }}</h3>
                <p class="content">{{ entry[1] }}</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
