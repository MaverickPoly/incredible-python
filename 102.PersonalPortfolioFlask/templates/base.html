<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{% block title %} Personal Portfolio {% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer"
    />
</head>
<body>
    <!-- Navigation -->
    <div class="fixed top-4 left-4 flex flex-col gap-2">
        <a href="{{ url_for('home_page') }}" class="w-12 h-12 flex items-center justify-center rounded-full bg-neutral-50 cursor-pointer shadow-lg border border-neutral-300 hover:bg-orange-700 hover:text-white duration-200 hover:scale-105">
            <i class="fa fa-house"></i>
        </a>
        <a href="{{ url_for('blogs_page') }}" class="w-12 h-12 flex items-center justify-center rounded-full bg-neutral-50 cursor-pointer shadow-lg border border-neutral-300 hover:bg-orange-700 hover:text-white duration-200 hover:scale-105">
            <i class="fa fa-bolt"></i>
        </a>
        <a href="{{ url_for('projects_page') }}" class="w-12 h-12 flex items-center justify-center rounded-full bg-neutral-50 cursor-pointer shadow-lg border border-neutral-300 hover:bg-orange-700 hover:text-white duration-200 hover:scale-105">
            <i class="fa fa-lightbulb"></i>
        </a>
    </div>

    {% block content %}
    {% endblock %}

    <script rel="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
