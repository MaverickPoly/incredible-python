<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>{% block title %} Todo List {% endblock %}</title>
</head>
<body class="bg-neutral-900 text-neutral-50">

<!-- Messages -->
<div class="fixed top-2 left-2 flex flex-col gap-3">
    {% with messages = get_flashed_messages() %}
        {% for message in messages %}
            <div class="rounded-lg py-2 px-5 bg-neutral-800 border border-neutral-600">
                {{ message }}
            </div>
        {% endfor %}
    {% endwith %}
</div>

{% block content %}
{% endblock %}

<!-- JavaScript file -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
