{% extends "base.html" %}

{% block title %} Create todo {% endblock %}

{% block content %}
<div class="flex items-center justify-center w-full h-screen">
    <form
        method="post"
        class="max-w-xl w-full border border-neutral-700 rounded-lg p-10 flex flex-col items-center"
    >
        <h2 class="text-4xl font-extrabold pb-10">Create</h2>

        <p class="font-bold text-lg pb-2 self-start">Title:</p>
        <input
            class="p-2 rounded-lg w-full outline-none border border-neutral-800 focus:border-neutral-700 mb-10"
            type="text"
            name="title"
            placeholder="Title"
        />

        <button
            type="submit"
            class="bg-neutral-300 text-neutral-900 text-lg cursor-pointer w-full rounded-lg p-2 hover:bg-neutral-100 mb-3"
        >
            Submit
        </button>
        <a
            href="{{ url_for('todos.view') }}"
            class="bg-neutral-800 text-neutral-200 text-lg cursor-pointer w-full rounded-lg p-2 hover:bg-neutral-700 text-center"
        >
            Cancel
        </a>
    </form>
</div>

{% endblock %}
